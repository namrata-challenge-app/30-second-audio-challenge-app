<!DOCTYPE html>
<html>

<head>
  <title>30 Sec Challenge Game</title>
</head>

<body style="
  margin:0;
  text-align:center;
  font-family:Arial;
  background:linear-gradient(to right, #667eea, #764ba2);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
">

  <h1>🎯 30 Sec Challenge</h1>

  <div style="margin-top:20px;">

    <p style="
    font-size:14px;
    background:rgba(255,0,0,0.2);
    padding:8px 12px;
    border-radius:8px;
    display:inline-block;
    margin-bottom:10px;
  ">
      ⚠️ Best experienced on Android/Desktop
    </p>

    <br />

    <button onclick="startChallenge()" style="
    padding:15px 30px;
    font-size:18px;
    background:#ff9800;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
  ">
      ▶️ Start Challenge
    </button>

  </div>

  <h2 id="challenge" style="margin-top:20px; font-size:24px;"></h2>
  <h3 id="timer" style="font-size:30px;"></h3>

  <h3 style="margin-top:30px;">📂 Recording List</h3>
  <div id="recordingsList"></div>

  <script>
    let challenges = [
      "Talk in a pirate accent",
      "Sing a song",
      "Tell a joke",
      "Speak in a robot voice",
      "Say tongue twister fast"
    ];

    let mediaRecorder;
    let audioChunks = [];
    let recordings = [];

    function startChallenge() {

  let isIphone = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isIphone) {
    alert("⚠️ Recording not supported properly on iPhone. Please use Android or Desktop.");
    return;
  }

  let random = challenges[Math.floor(Math.random() * challenges.length)];
  document.getElementById("challenge").innerText = random;

  let timeLeft = 30;
  document.getElementById("timer").innerText = timeLeft;

  let timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      stopRecording();
      document.getElementById("timer").innerText = "Time's up!";
    }
  }, 1000);

  startRecording();
}

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          const audioBlob = new Blob(audioChunks);
          const url = URL.createObjectURL(audioBlob);

          recordings.push({
            challenge: document.getElementById("challenge").innerText,
            audio: url
          });

          displayRecordings();
        };

        mediaRecorder.start();

      } catch (err) {
        alert("Mic access issue or browser not supported");
        console.error(err);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
      }
    }

    function displayRecordings() {
      let list = document.getElementById("recordingsList");
      list.innerHTML = "";

      recordings.forEach((rec, index) => {
        let div = document.createElement("div");

        div.innerHTML = `
      <p>${rec.challenge}</p>
      <button onclick="playSaved(${index})">▶️ Play</button>
      <hr/>
    `;

        list.appendChild(div);
      });
    }

    function playSaved(index) {
      let audio = new Audio(recordings[index].audio);
      audio.play();
    }
  </script>

</body>

</html>
