        function startChallenge() {

            progressBar.style.width = "0%";

            if (isRecording) return;

            startBtn.style.opacity = "1";

            document.getElementById("startBtn").innerText =
                "⏳ Starting...";

            document.getElementById("startBtn").style.pointerEvents =
                "none";

            document.getElementById("startBtn").style.animation =
                "none";

            // reset timer
            document.getElementById("timer").style.color =
                "white";

            document.getElementById("timer").innerText = "";

            // stop old audio
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.src = "";
                currentAudio = null;
            }

            document.getElementById("startBtn").disabled = true;

            disablePlayButtons();

            let isIphone =
                /iPhone|iPad|iPod/i.test(navigator.userAgent);

            if (isIphone) {

                showPopup(
                    "⚠️ This game works best on Android/Desktop 😊"
                );

                let btn = document.getElementById("startBtn");

                btn.style.opacity = "0.7";
                btn.disabled = false;
                btn.style.pointerEvents = "auto";
                btn.innerText = "🚀 Start Challenge";
                btn.style.animation = "pulse 2s infinite";

                return;
            }

            // 🎯 Selected cartoon
            let selectedCharacter =
                document.getElementById("characterSelect").value;

            // 🎯 Challenges list
            let challenges =
                cartoonChallenges[selectedCharacter]
                || cartoonChallenges["random"];

            let randomChallenge;

            // reset if all used
            if (recentChallenges.length === challenges.length) {
                recentChallenges = [];
            }

            do {

                randomChallenge =
                    challenges[Math.floor(
                        Math.random() * challenges.length
                    )];

            }

            while (
                recentChallenges.includes(
                    randomChallenge.text
                )
            );

            recentChallenges.push(
                randomChallenge.text
            );

            // keep last 5 only
            if (recentChallenges.length > 5) {
                recentChallenges.shift();
            }

            // 🎯 Save challenge text
            currentChallengeText =
                randomChallenge.text;

            // 🎯 Show challenge
            challengeEl.innerText =
                randomChallenge.text;

            let vid = document.getElementById("cartoonVideo");

            vid.src = randomChallenge.video;

            vid.play().catch(() => { });

            // 🎯 Animation
            challengeEl.style.transform = "scale(1.1)";

            setTimeout(() => {

                challengeEl.style.transform = "scale(1)";

            }, 200);

            document.getElementById("challenge").style.color =
                "white";

            startRecording();
        }

        async function startRecording() {

            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }

            if (timer !== null) {
                clearInterval(timer);
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            document.getElementById("challenge").style.color = "#FFD700";
            document.getElementById("challenge").innerText = currentChallengeText + " 🎤";

            try {

                stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });

                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                const micSource = audioCtx.createMediaStreamSource(stream);
                const destination = audioCtx.createMediaStreamDestination();

                // 🔊 MIC BOOST
                const gainNode = audioCtx.createGain();
                gainNode.gain.value = 1.5;

                // 🎤 SIMPLE REVERB (ECHO FEEL)
                const delay = audioCtx.createDelay();
                delay.delayTime.value = 0.25;

                const feedback = audioCtx.createGain();
                feedback.gain.value = 0.3;

                delay.connect(feedback);
                feedback.connect(delay);

                // connect mic → gain → delay → destination
                micSource.connect(gainNode);
                gainNode.connect(destination);
                gainNode.connect(delay);
                delay.connect(destination);

                // 🎯 SOUND EFFECT
                let randomEffect = getSoundEffect(currentChallengeText);

                if (randomEffect) {
                    currentEffect = new Audio(randomEffect);

                    const effectSource = audioCtx.createMediaElementSource(currentEffect);
                    effectSource.connect(destination);

                    setTimeout(() => {
                        currentEffect.play().catch(() => { });
                    }, 800);
                }

                // 🎵 BACKGROUND MUSIC
                bgMusic = new Audio("sounds/bg.mp3");
                bgMusic.loop = true;
                bgMusic.volume = 0.15;

                const bgSource = audioCtx.createMediaElementSource(bgMusic);
                bgSource.connect(destination);

                bgMusic.play().catch(() => {
                    console.log("BG music autoplay blocked");
                });

                // 👉 FINAL RECORDING STREAM
                mediaRecorder = new MediaRecorder(destination.stream);

                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {

                    document.getElementById("stopBtn").style.display = "none";

                    let btn = document.getElementById("startBtn");
                    btn.style.opacity = "1";
                    btn.disabled = false;
                    btn.style.pointerEvents = "auto";
                    btn.innerText = "🚀 Start Challenge";
                    btn.style.animation = "pulse 2s infinite";

                    isRecording = false;
                    enablePlayButtons();

                    const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
                    const url = URL.createObjectURL(audioBlob);

                    // ✅ SAVE WITH EFFECT
                    recordings.push({
                        challenge: currentChallengeText,
                        audio: url,
                        effect: randomEffect
                    });

                    displayRecordings();

                    setTimeout(() => {
                        playSaved(recordings.length - 1);
                    }, 400);

                    if (currentEffect) {
                        currentEffect.pause();
                        currentEffect = null;
                    }
                };

                mediaRecorder.start();
                startReelRecording(destination.stream);
                toggleStopButton(true);

                beepSound.currentTime = 0;
                beepSound.play().catch(() => { });

                isRecording = true;

                let timeLeft = 30;
                timerEl.innerText = timeLeft;

                timer = setInterval(() => {

                    timeLeft--;

                    let percent = ((30 - timeLeft) / 30) * 100;
                    progressBar.style.width = percent + "%";

                    timerEl.innerText = timeLeft;

                    if (timeLeft <= 5) {
                        document.getElementById("timer").style.color = "red";
                    }

                    if (timeLeft <= 3 && timeLeft > 0) {
                        beepSound.currentTime = 0;
                        beepSound.play().catch(() => { });
                    }

                    if (timeLeft <= 0) {
                        score++;
                        document.getElementById("score").innerText = "Score: " + score;

                        stopRecording();

                        document.getElementById("timer").innerText = "⏰ Time's up!";
                        document.getElementById("challenge").innerText =
                            "✅ Saved!";
                    }

                }, 1000);

            } catch (err) {

                showPopup("🎤 Please allow microphone access!");

                isRecording = false;
                enablePlayButtons();

                document.getElementById("startBtn").disabled = false;
                document.getElementById("startBtn").style.pointerEvents = "auto";

                toggleStopButton(false);

                console.error(err);
            }
        }

        function stopRecording() {

            progressBar.style.width = "0%";

            if (timer) {
                clearInterval(timer);
                timer = null;
            }

            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
                if (reelRecorder && reelRecorder.state !== "inactive") {
                    reelRecorder.stop();
                }
            }

            // 🎤 stop mic
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }

            if (isRecording) {
                document.getElementById("timer").innerText = "⏹ Stopped!";
                document.getElementById("challenge").innerText = "✅ Saved early! 🔥";
            }

            // 🎵 stop background music
            if (bgMusic) {
                bgMusic.pause();
                bgMusic.currentTime = 0;
                bgMusic = null;
            }

            // 🔇 close audio context (VERY IMPORTANT)
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
        }

        function displayRecordings() {

            if (recordings.length === 0) {

            list.innerHTML = `

🔥 Record → Download → Post Reel → Tag & challenge your friends!
</p>
`;

            recordings.forEach((rec, index) => {

margin-left:10px;

🎬 Download

                list.appendChild(div);

            list.scrollIntoView({ behavior: "smooth", block: "start" });
        }


        function playSaved(index) {
            if (isRecording) {
                showPopup("⛔ Recording in progress!");
                return;
            }

            let rec = recordings[index];
            if (!rec || !rec.audio) {
                showPopup("⚠️ Audio not available");
                return;
            }

            stopCurrentAudio();

            let voice = new Audio(rec.audio);
            let effect = rec.effect ? new Audio(rec.effect) : null;

            if (effect) effect.currentTime = 0;

            currentAudio = voice;
            currentEffect = effect || null;

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaElementSource(voice);

            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 1.5; // 🔥 increase loudness (try 1.2–2)

            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            if (effect) effect.volume = 0.4;

            disablePlayButtons();

            voice.play().catch(() => {
                showPopup("⚠️ Tap again to play audio");
            });

            voice.onplay = () => {
                let interval = setInterval(showEmojiReaction, 200);

                if (effect) {
                    setTimeout(() => {
                        effect.currentTime = 0;
                        effect.play().catch(() => { });
                    }, 800);
                }

                voice.onended = () => {
                    clearInterval(interval);

                    if (currentEffect) {
                        currentEffect.pause();
                        currentEffect.currentTime = 0;
                    }

                    currentAudio = null;
                    currentEffect = null;

                    enablePlayButtons();
                };

                // ✅ correct fix
                voice.onerror = () => {
                    clearInterval(interval);
                    enablePlayButtons();
                };
            };
        }

        function disablePlayButtons() {
            document.querySelectorAll(".playBtn").forEach(btn => {
                btn.disabled = true;
                btn.style.opacity = 0.5;
            });
        }

        function enablePlayButtons() {
            document.querySelectorAll(".playBtn").forEach(btn => {
                btn.disabled = false;
                btn.style.opacity = 1;
            });
        }

        function deleteRecording(index) {
            if (!recordings[index]) return;

            stopCurrentAudio();

            if (recordings[index].audio) {
                URL.revokeObjectURL(recordings[index].audio);
            }

            recordings.splice(index, 1);
            displayRecordings();
        }

        function getSoundEffect(challenge) {

            let text = challenge.toLowerCase();
            let effect = soundEffects[Math.floor(Math.random() * soundEffects.length)];

            if (text.includes("angry")) {
                return "sounds/drum1.mp3";
            }

            if (text.includes("baby")) {
                return "sounds/cat1.mp3";
            }

            if (text.includes("love")) {
                return "sounds/wow1.mp3";
            }

            return effect || "";
        }

        function downloadRecording(index) {
            let rec = recordings[index];

            if (!rec || !rec.audio) {
                showPopup("⚠️ File not available");
                return;
            }

            let link = document.createElement("a");
            link.href = rec.audio;

            link.download = "funny-reel.mp4";

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        function downloadVideo(index) {

            let rec = recordings[index];

            if (!rec || !rec.video) {
                showPopup("⚠️ Reel not ready yet");
                return;
            }

            let link = document.createElement("a");

            link.href = rec.video;

            link.download = "funny-reel.mp4";

            document.body.appendChild(link);

            link.click();

            document.body.removeChild(link);
        }

        function toggleStopButton(show) {
            document.getElementById("stopBtn").style.display = show ? "inline-block" : "none";
        }
        displayRecordings();
        document.getElementById("stopBtn").style.display = "none";

        function shareRecording(index) {

            let file = recordings[index];

            if (!file || !file.video) {
                showPopup("⚠️ Video not ready yet");
                return;
            }

            if (navigator.share && typeof navigator.canShare === "function") {

                fetch(file.video)
                    .then(res => res.blob())
                    .then(blob => {

                        let fileObj = new File(
                            [blob],
                            "challenge.mp4",
                            { type: "video/mp4" }
                        );

                        console.log(fileObj.type);

                        if (navigator.canShare({ files: [fileObj] })) {

                            navigator.share({
                                title: "30 Sec Challenge 🔥",
                                text: file.challenge,
                                files: [fileObj]
                            });

                        } else {

                            fallbackShare(file, index);

                        }

                    })
                    .catch(() => fallbackShare(file, index));

            } else {

                fallbackShare(file, index);

            }
        }

        function showEmojiReaction() {
            const emoji = emojis[Math.floor(Math.random() * emojis.length)];

            const el = document.createElement("div");
            el.innerText = emoji;

            el.style.position = "fixed";
            el.style.left = Math.random() * 80 + "%";
            el.style.top = "60%";
            el.style.fontSize = (20 + Math.random() * 30) + "px";
            el.style.opacity = "1";
            el.style.transition = "all 1s ease-out";
            el.style.pointerEvents = "none";

            document.body.appendChild(el);

            setTimeout(() => {
                el.style.top = "20%";
                el.style.opacity = "0";
            }, 50);

            setTimeout(() => {
                document.body.removeChild(el);
            }, 1000);
        }

        function showPopup(message) {
            const popup = document.getElementById("popup");
            popup.innerText = message;
            popup.style.display = "block";

            clearTimeout(popupTimer);

            popupTimer = setTimeout(() => {
                popup.style.display = "none";
            }, 2500);
        }

        function fallbackShare(file, index) {
            let shareText = `🔥 I scored in 30 Sec Challenge!
🎤 ${file.challenge}

👉 Try it now!`;

            navigator.clipboard.writeText(shareText)
                .then(() => {
                    showPopup("📋 Copied + Audio downloaded. Share it 😈");
                })
                .catch(() => {
                    showPopup("⚠️ Copy failed. Please copy manually.");
                });

            downloadRecording(index);
        }

        function stopCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }

            if (currentEffect) {
                currentEffect.pause();
                currentEffect.currentTime = 0;
                currentEffect = null;
            }
        }
        async function startReelRecording(audioStream) {

            const reelArea = document.getElementById("reelArea");

            reelCanvas.width = 1080;
            reelCanvas.height = 1920;

            reelInterval = setInterval(async () => {

                const canvasCapture = await html2canvas(reelArea, {
                    backgroundColor: "#667eea",
                    useCORS: true,
                    scale: 2
                });

                reelCtx.clearRect(0, 0, reelCanvas.width, reelCanvas.height);

                reelCtx.fillStyle = "#764ba2";
                reelCtx.fillRect(
                    0,
                    0,
                    reelCanvas.width,
                    reelCanvas.height
                );

                reelCtx.drawImage(
                    canvasCapture,
                    0,
                    150,
                    reelCanvas.width,
                    reelCanvas.height - 300
                );

            }, 100);

            const videoStream = reelCanvas.captureStream(30);

            reelStream = new MediaStream([
                ...videoStream.getVideoTracks(),
                ...audioStream.getAudioTracks()
            ]);

            let options = {
                videoBitsPerSecond: 5000000
            };

            if (MediaRecorder.isTypeSupported("video/mp4")) {
                options.mimeType = "video/mp4";
            } else {
                options.mimeType = "video/webm;codecs=vp8";
            }

            reelRecorder = new MediaRecorder(reelStream, options);

            reelChunks = [];

            reelRecorder.ondataavailable = e => {
                if (e.data.size > 0) {
                    reelChunks.push(e.data);
                }
            };

            reelRecorder.onstop = () => {

                clearInterval(reelInterval);

                const reelBlob = new Blob(reelChunks, {
                    type: "video/mp4"
                });

                const reelURL = URL.createObjectURL(reelBlob);

                const latestRecording = recordings[recordings.length - 1];

                if (latestRecording) {
                    latestRecording.video = reelURL;
                }
            };

            reelRecorder.start();
        }

        window.addEventListener("beforeunload", () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            recordings.forEach(rec => {
                if (rec.audio) {
                    URL.revokeObjectURL(rec.audio);
                }
            });
        });
    </script>
